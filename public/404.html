<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecionando...</title>
  <script>
    // SPA fallback: preserve the path for React Router
    // This works by storing the path in sessionStorage and redirecting to index.html
    // The app will then use the stored path to navigate correctly
    var path = window.location.pathname + window.location.search + window.location.hash;
    sessionStorage.setItem('spa-redirect', path);
    window.location.replace('/');
  </script>
</head>
<body>
  <p>Redirecionando...</p>
</body>
</html>
